<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Mensuel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0e;--s1:#111318;--s2:#181c23;--s3:#1f242e;--border:#252b38;--text:#e2e8f0;--muted:#64748b;--accent:#a8ff3e;--fixed:#ff4d6d;--abos:#ffb347;--var:#3effd0;--green:#3eff8b;--blue:#60a5fa;--purple:#c084fc}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
nav{position:sticky;top:0;z-index:50;background:rgba(8,10,14,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;max-width:1100px;margin:0 auto;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:center}
.nav-inner::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:13px 14px;cursor:pointer;transition:all .2s;letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.sync-indicator{margin-left:auto;flex-shrink:0;display:flex;align-items:center;gap:6px;font-size:.6rem;color:var(--muted);padding:0 12px;white-space:nowrap}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.saving{background:var(--abos);animation:pulse .8s infinite}
.sync-dot.error{background:var(--fixed)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page{display:none;max-width:1100px;margin:0 auto;padding:20px 14px 90px;animation:fadeUp .3s ease both}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.page-title{font-family:'Syne',sans-serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;letter-spacing:-.03em;line-height:1}
.page-title span{color:var(--accent)}
.salary-widget{display:flex;align-items:center;gap:8px;background:var(--s2);border:1.5px solid var(--accent);border-radius:12px;padding:8px 14px}
.salary-widget label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.salary-input{background:none;border:none;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;width:110px;text-align:right;outline:none}
.salary-unit{color:var(--accent);font-size:.8rem}
.decouvert-row{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:7px 14px;margin-bottom:14px;font-size:.72rem;flex-wrap:wrap}
.decouvert-row label{color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.decouvert-input{background:none;border:none;color:var(--fixed);font-family:'JetBrains Mono',monospace;font-size:.82rem;width:80px;text-align:right;outline:none}
.net-display{color:var(--muted);font-size:.7rem;margin-left:auto}
.net-display strong{color:var(--text)}
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
@media(max-width:560px){.summary-strip{grid-template-columns:repeat(2,1fr)}}
.scard{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.scard-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:5px}
.scard-value{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.col{display:flex;flex-direction:column;gap:14px}
.panel{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 10px;border-bottom:1px solid var(--border)}
.panel-title{display:flex;align-items:center;gap:7px;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.panel-total{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
.fixed-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;padding:9px 15px;border-bottom:1px solid var(--border);transition:background .15s}
.fixed-row:last-child{border-bottom:none}
.fixed-row:hover{background:var(--s2)}
.row-day{font-size:.62rem;color:var(--muted);text-align:center;background:var(--s3);border-radius:5px;padding:2px 3px}
.row-name{font-size:.75rem;color:var(--text)}
.row-name.once{font-size:.7rem;color:var(--abos)}
.row-amt{font-size:.8rem;font-weight:500;white-space:nowrap}
.abo-row{display:grid;grid-template-columns:28px 1fr auto 14px;align-items:center;gap:7px;padding:9px 15px;border-bottom:1px solid var(--border);transition:background .15s}
.abo-row:last-child{border-bottom:none}
.abo-row:hover{background:var(--s2)}
.abo-amt-input{background:none;border:none;border-bottom:1px solid transparent;color:var(--abos);font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:500;width:68px;text-align:right;outline:none;transition:border-color .2s}
.abo-amt-input:focus{border-bottom-color:var(--abos)}
.bcat-row{padding:9px 15px;border-bottom:1px solid var(--border);transition:background .15s}
.bcat-row:last-child{border-bottom:none}
.bcat-row:hover{background:var(--s2)}
.bcat-top{display:grid;grid-template-columns:1fr 64px 64px 36px 36px;gap:4px;align-items:center;margin-bottom:5px}
.bcat-name{font-size:.75rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bcat-num{font-size:.7rem;text-align:right;white-space:nowrap}
.progress-track{height:3px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.total-row{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-top:1px solid var(--border);font-size:.78rem}
.hist-section{border-top:1px solid var(--border)}
.hist-header{padding:7px 15px 4px;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:7px 15px;border-bottom:1px solid var(--border);gap:8px}
.hist-item:last-child{border-bottom:none}
.hist-left{display:flex;flex-direction:column;gap:1px;min-width:0}
.hist-cat{font-size:.73rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-note{font-size:.62rem;color:var(--muted)}
.hist-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hist-amt{font-size:.78rem;font-weight:500}
.hist-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:2px 5px;border-radius:4px;transition:all .15s}
.hist-del:hover{color:var(--fixed);background:rgba(255,77,109,.1)}
.empty-state{padding:16px;text-align:center;color:var(--muted);font-size:.72rem;font-style:italic}
.rav-panel{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.rav-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.rav-cell{background:var(--s1);padding:12px 14px;text-align:center}
.rav-cell-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.rav-cell-value{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700}
.rav-final{background:var(--s2);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.rav-final-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.rav-final-value{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-.03em}
.sub-col-hdr{display:grid;grid-template-columns:1fr 64px 64px 36px 36px;gap:4px;padding:6px 15px;border-bottom:1px solid var(--border)}
.sub-col-hdr span{font-size:.58rem;color:var(--muted);text-align:right;text-transform:uppercase;letter-spacing:.08em}
.sub-col-hdr span:first-child{text-align:left}
.fab{position:fixed;bottom:22px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#080a0e;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 22px rgba(168,255,62,.35);transition:transform .2s,box-shadow .2s;z-index:40;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(168,255,62,.5)}
.fab.hidden{display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:340px;animation:scaleIn .2s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:18px}
.fgrp{margin-bottom:12px}
.fgrp label{display:block;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.fgrp select,.fgrp input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:9px 11px;outline:none;transition:border-color .2s}
.fgrp select:focus,.fgrp input:focus{border-color:var(--accent)}
.fgrp select option{background:var(--s2)}
.modal-actions{display:flex;gap:9px;margin-top:16px}
.btn-cancel{flex:1;padding:10px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-add{flex:2;padding:10px;border-radius:11px;border:none;background:var(--accent);color:#080a0e;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-add:hover{opacity:.85}
.synth-wrap{overflow-x:auto}
.synth-table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:600px}
.synth-table th{padding:9px 11px;text-align:right;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:var(--s2);font-weight:400;white-space:nowrap}
.synth-table th:first-child{text-align:left}
.synth-table td{padding:10px 11px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
.synth-table td:first-child{text-align:left;color:var(--muted);font-size:.7rem}
.synth-table tr:last-child td{border-bottom:none;font-weight:700}
.synth-table tr:hover td{background:var(--s2)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 16px;font-size:.72rem;color:var(--text);opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300}
.loading-screen.hidden{display:none}
.loading-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent)}
.loading-sub{font-size:.7rem;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-title">Budget 2025</div>
  <div class="loading-sub" id="loadingMsg">Chargement des données…</div>
</div>

<nav><div class="nav-inner" id="navInner">
  <div class="sync-indicator"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">–</span></div>
</div></nav>
<div id="pages"></div>

<button class="fab" id="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Nouvelle entrée</h2>
    <div class="fgrp"><label>Type</label>
      <select id="inputType" onchange="updateCatList()">
        <option value="depense">Dépense variable</option>
        <option value="remboursement">Remboursement</option>
      </select>
    </div>
    <div class="fgrp"><label>Catégorie</label><select id="inputCat"></select></div>
    <div class="fgrp"><label>Montant (€)</label><input type="number" id="inputAmount" placeholder="0.00" step="0.01" min="0"></div>
    <div class="fgrp"><label>Note (optionnel)</label><input type="text" id="inputNote" placeholder="ex: Carrefour"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-add" onclick="addEntry()">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG SUPABASE ──
const SUPABASE_URL = 'https://fntxsrcmaemrcpivxrkk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZudHhzcmNtYWVtcmNwaXZ4cmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk4MjQsImV4cCI6MjA5MDk3NTgyNH0.RfShJuJyazTxdem4T67-zT11hNnFnVWGJ068_Lgj7Kw';
const HEADERS = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

// ── DONNÉES ──
const MONTHS = ['Avril','Mai','Juin','Juillet','Août','Septembre'];
const FIXED_ALL = [
  {day:2,  name:'Crédit Automobile',           amt:267.61},
  {day:3,  name:'Loyer CDC Habitat',            amt:501.00},
  {day:5,  name:'OHM Énergie',                 amt:101.00},
  {day:15, name:'Assurance Habitation CA IDF',  amt:7.48},
];
const FIXED_AVRIL_ONLY = [
  {day:1, name:'Crédit Conso Carrefour ⚡', amt:53.10, once:true},
];
const DEFAULT_ABOS = [
  {day:4, name:'Forfait CB',            amt:15.30},
  {day:8, name:'Bouygues Box Internet', amt:34.99},
  {day:8, name:'Bouygues Mobile',       amt:14.99},
];
const BUDGET_CATS = [
  {name:'Épargne',               budget:200.00, color:'#60a5fa'},
  {name:'Courses',               budget:200.00, color:'#3effd0'},
  {name:'Essence',               budget:120.00, color:'#ffb347'},
  {name:'Achats',                budget:100.00, color:'#f472b6'},
  {name:'Sorties / Restaurants', budget:120.00, color:'#a78bfa'},
  {name:'Whey',                  budget:39.99,  color:'#a8ff3e'},
  {name:'Psy',                   budget:120.00, color:'#c084fc'},
  {name:'Piscine',               budget:35.00,  color:'#38bdf8'},
  {name:'Aroma Zone',            budget:40.00,  color:'#fb923c'},
  {name:'Santé',                 budget:50.00,  color:'#34d399'},
  {name:'Autres',                budget:750.00, color:'#94a3b8'},
];

let state = {};
let saveTimer = null;

function defaultState(month) {
  return {
    salary: month==='Avril' ? 2129.46 : 0,
    decouvert: month==='Avril' ? 543.43 : 0,
    abos: DEFAULT_ABOS.map(a=>({...a})),
    entries: [],
  };
}
function gs(month) {
  if (!state[month]) state[month] = defaultState(month);
  return state[month];
}

// ── SUPABASE ──
async function dbLoad() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/budget?select=month,data`, { headers: HEADERS });
    if (!r.ok) throw new Error(await r.text());
    const rows = await r.json();
    rows.forEach(row => { state[row.month] = row.data; });
    setSyncStatus('ok', 'Synchronisé');
  } catch(e) {
    setSyncStatus('error', 'Hors ligne');
    console.error('Supabase load error:', e);
  }
}

async function dbSave(month) {
  setSyncStatus('saving', 'Sauvegarde…');
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/budget`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ month, data: gs(month), updated_at: new Date().toISOString() })
    });
    if (!r.ok) throw new Error(await r.text());
    setSyncStatus('ok', 'Synchronisé');
  } catch(e) {
    setSyncStatus('error', 'Erreur sync');
    console.error('Supabase save error:', e);
  }
}

function save(month) {
  // Fallback localStorage
  try { localStorage.setItem('budget-2025', JSON.stringify(state)); } catch(e){}
  // Debounce Supabase
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => dbSave(month), 800);
}

function setSyncStatus(status, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
}

// ── CALCULS ──
function fmt(n) { return (isNaN(n)?0:n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function fp(n)  { return (Math.max(0,Math.min(1,n))*100).toFixed(0)+'%'; }
function fr(n)  { return ((1-Math.max(0,Math.min(1,n)))*100).toFixed(0)+'%'; }
function getFixed(month) { return month==='Avril'?[...FIXED_ALL,...FIXED_AVRIL_ONLY]:[...FIXED_ALL]; }
function fixedTotal(month) { return getFixed(month).reduce((s,c)=>s+c.amt,0); }
function abosTotal(month)  { return gs(month).abos.reduce((s,a)=>s+(parseFloat(a.amt)||0),0); }
function spent(month,cat)  { return gs(month).entries.filter(e=>e.type==='depense'&&e.cat===cat).reduce((s,e)=>s+e.amt,0); }
function totalSpent(month) { return BUDGET_CATS.reduce((s,c)=>s+spent(month,c.name),0); }
function totalRemb(month)  { return gs(month).entries.filter(e=>e.type==='remboursement').reduce((s,e)=>s+e.amt,0); }
function netSal(month)     { return (parseFloat(gs(month).salary)||0)-(parseFloat(gs(month).decouvert)||0); }
function rav(month)        { return netSal(month)-fixedTotal(month)-abosTotal(month)-totalSpent(month)+totalRemb(month); }
function ravColor(v)       { return v<0?'var(--fixed)':v<200?'var(--abos)':'var(--green)'; }
function pctColor(p)       { return p>=1?'var(--fixed)':p>=.8?'var(--abos)':'var(--var)'; }

// ── RENDU ──
let currentMonth = 'Avril';

function render() {
  renderNav();
  const container = document.getElementById('pages');
  container.innerHTML = '';
  MONTHS.forEach(m => {
    const d = document.createElement('div');
    d.className = 'page'+(m===currentMonth?' active':'');
    d.id = pid(m);
    d.innerHTML = monthHTML(m);
    container.appendChild(d);
  });
  const s = document.createElement('div');
  s.className = 'page'+(currentMonth==='Synthèse'?' active':'');
  s.id = 'page-Synthese';
  s.innerHTML = syntheseHTML();
  container.appendChild(s);
  bindInputs();
  updateFab();
}

function renderNav() {
  const inner = document.getElementById('navInner');
  const syncEl = inner.querySelector('.sync-indicator');
  const tabs = [...MONTHS,'Synthèse'].map(t=>
    `<button class="tab-btn ${t===currentMonth?'active':''}" onclick="switchTab('${t}')">${t}</button>`
  ).join('');
  inner.innerHTML = tabs;
  inner.appendChild(syncEl);
}

function pid(m) { return 'page-'+m.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s/g,'-'); }

function switchTab(m) {
  currentMonth = m;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(m==='Synthèse'?'page-Synthese':pid(m))?.classList.add('active');
  renderNav();
  updateFab();
}

function updateFab() {
  document.getElementById('fab').classList.toggle('hidden', currentMonth==='Synthèse');
}

function monthHTML(month) {
  const ms = gs(month);
  const ft=fixedTotal(month), at=abosTotal(month), ts=totalSpent(month), tr=totalRemb(month);
  const net=netSal(month), rv=rav(month), rc=ravColor(rv);
  const tb=BUDGET_CATS.reduce((s,c)=>s+c.budget,0);
  const id=pid(month);

  return `
  <div class="page-header">
    <div class="page-title">Budget <span>${month}</span></div>
    <div class="salary-widget">
      <label>Salaire</label>
      <input class="salary-input" id="sal-${id}" type="number" step="0.01" value="${ms.salary||''}" placeholder="0.00">
      <span class="salary-unit">€</span>
    </div>
  </div>
  <div class="decouvert-row">
    <label>− Découvert / Avance :</label>
    <input class="decouvert-input" id="dec-${id}" type="number" step="0.01" value="${ms.decouvert||''}" placeholder="0.00">
    <span style="color:var(--fixed);font-size:.72rem">€</span>
    <span class="net-display">Net disponible : <strong>${fmt(net)}</strong></span>
  </div>
  <div class="summary-strip">
    <div class="scard"><div class="scard-label">Charges fixes</div><div class="scard-value" style="color:var(--fixed)">${fmt(ft)}</div></div>
    <div class="scard"><div class="scard-label">Abonnements</div><div class="scard-value" style="color:var(--abos)">${fmt(at)}</div></div>
    <div class="scard"><div class="scard-label">Dépensé</div><div class="scard-value" style="color:var(--var)">${fmt(ts)}</div></div>
    <div class="scard"><div class="scard-label">Reste à vivre</div><div class="scard-value" style="color:${rc}">${fmt(rv)}</div></div>
  </div>
  <div class="two-col">
    <div class="col">
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title"><div class="dot" style="background:var(--fixed)"></div>Charges fixes</div><div class="panel-total" style="color:var(--fixed)">${fmt(ft)}</div></div>
        ${getFixed(month).map(c=>`<div class="fixed-row"><div class="row-day">${c.day}</div><div class="row-name ${c.once?'once':''}">${c.name}</div><div class="row-amt" style="color:var(--fixed)">${fmt(c.amt)}</div></div>`).join('')}
      </div>
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title"><div class="dot" style="background:var(--abos)"></div>Abonnements <span style="font-size:.58rem;color:var(--muted);margin-left:4px">(modifiables)</span></div><div class="panel-total" style="color:var(--abos)">${fmt(at)}</div></div>
        ${ms.abos.map((a,i)=>`<div class="abo-row"><div class="row-day">${a.day}</div><div class="row-name">${a.name}</div><input class="abo-amt-input" id="abo-${id}-${i}" type="number" step="0.01" value="${a.amt}"><span style="font-size:.68rem;color:var(--abos)">€</span></div>`).join('')}
      </div>
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title"><div class="dot" style="background:var(--green)"></div>Remboursements reçus</div><div class="panel-total" style="color:var(--green)">${fmt(tr)}</div></div>
        ${ms.entries.filter(e=>e.type==='remboursement').length===0
          ?`<div class="empty-state">Aucun remboursement ce mois</div>`
          :ms.entries.filter(e=>e.type==='remboursement').map(e=>`
            <div class="hist-item">
              <div class="hist-left"><div class="hist-cat">${e.cat}</div>${e.note?`<div class="hist-note">${e.note}</div>`:''}</div>
              <div class="hist-right"><div class="hist-amt" style="color:var(--green)">+${fmt(e.amt)}</div>
              <button class="hist-del" onclick="delEntry('${month}',${ms.entries.indexOf(e)})">✕</button></div>
            </div>`).join('')}
      </div>
    </div>
    <div class="col">
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title"><div class="dot" style="background:var(--var)"></div>Budget variable</div><div class="panel-total" style="color:var(--var)">${fmt(tb)}</div></div>
        <div class="sub-col-hdr"><span>Catégorie</span><span>Dépensé</span><span>Restant €</span><span>%</span><span>Rst%</span></div>
        ${BUDGET_CATS.map(cat=>{
          const sp=spent(month,cat.name),rst=cat.budget-sp,pct=sp/cat.budget,pc=pctColor(Math.min(pct,1));
          return `<div class="bcat-row"><div class="bcat-top">
            <span class="bcat-name">${cat.name}</span>
            <span class="bcat-num" style="color:${pc}">${fmt(sp)}</span>
            <span class="bcat-num" style="color:${rst<0?'var(--fixed)':'var(--muted)'}">${fmt(rst)}</span>
            <span class="bcat-num" style="color:${pc}">${fp(pct)}</span>
            <span class="bcat-num" style="color:${rst<0?'var(--fixed)':'var(--muted)'}">${fr(pct)}</span>
          </div><div class="progress-track"><div class="progress-fill" style="width:${Math.min(pct,1)*100}%;background:${cat.color}"></div></div></div>`;
        }).join('')}
        <div class="total-row"><span style="color:var(--muted);font-size:.68rem">TOTAL DÉPENSÉ</span><span style="color:var(--var)">${fmt(ts)} <span style="color:var(--muted);font-weight:400">/ ${fmt(tb)}</span></span></div>
        ${ms.entries.filter(e=>e.type==='depense').length>0?`
        <div class="hist-section"><div class="hist-header">Historique</div>
        ${ms.entries.filter(e=>e.type==='depense').slice().reverse().map(e=>`
          <div class="hist-item">
            <div class="hist-left"><div class="hist-cat">${e.cat}</div>${e.note?`<div class="hist-note">${e.note}</div>`:''}</div>
            <div class="hist-right"><div class="hist-amt" style="color:var(--fixed)">${fmt(e.amt)}</div>
            <button class="hist-del" onclick="delEntry('${month}',${ms.entries.indexOf(e)})">✕</button></div>
          </div>`).join('')}
        </div>`:''}
      </div>
      <div class="rav-panel">
        <div class="panel-hdr"><div class="panel-title"><div class="dot" style="background:var(--accent)"></div>Reste à vivre</div></div>
        <div class="rav-grid">
          <div class="rav-cell"><div class="rav-cell-label">Net disponible</div><div class="rav-cell-value" style="color:var(--accent)">${fmt(net)}</div></div>
          <div class="rav-cell"><div class="rav-cell-label">− Charges fixes</div><div class="rav-cell-value" style="color:var(--fixed)">${fmt(ft)}</div></div>
          <div class="rav-cell"><div class="rav-cell-label">− Abonnements</div><div class="rav-cell-value" style="color:var(--abos)">${fmt(at)}</div></div>
          <div class="rav-cell"><div class="rav-cell-label">− Dépensé</div><div class="rav-cell-value" style="color:var(--var)">${fmt(ts)}</div></div>
          ${tr>0?`<div class="rav-cell" style="grid-column:1/-1"><div class="rav-cell-label">+ Remboursements</div><div class="rav-cell-value" style="color:var(--green)">${fmt(tr)}</div></div>`:''}
        </div>
        <div class="rav-final"><div class="rav-final-label">= Reste à vivre</div><div class="rav-final-value" style="color:${rc}">${fmt(rv)}</div></div>
      </div>
    </div>
  </div>`;
}

function syntheseHTML() {
  const rows = [
    {l:'Salaire brut',     f:m=>parseFloat(gs(m).salary)||0,    c:'var(--accent)'},
    {l:'− Découvert',      f:m=>parseFloat(gs(m).decouvert)||0, c:'var(--fixed)'},
    {l:'Net disponible',   f:m=>netSal(m),                       c:'var(--text)'},
    {l:'− Charges fixes',  f:m=>fixedTotal(m),                   c:'var(--fixed)'},
    {l:'− Abonnements',    f:m=>abosTotal(m),                    c:'var(--abos)'},
    {l:'− Dépensé',        f:m=>totalSpent(m),                   c:'var(--var)'},
    {l:'+ Remboursements', f:m=>totalRemb(m),                    c:'var(--green)'},
    {l:'Reste à vivre',    f:m=>rav(m),                          c:'var(--green)',bold:true},
  ];
  return `
  <div class="page-header"><div class="page-title">Synthèse <span>6 mois</span></div></div>
  <div class="panel synth-wrap"><table class="synth-table">
    <thead><tr><th>Indicateur</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr></thead>
    <tbody>${rows.map(row=>{
      const vals=MONTHS.map(m=>row.f(m)),tot=vals.reduce((s,v)=>s+v,0);
      return `<tr><td style="color:${row.c};font-weight:${row.bold?700:400}">${row.l}</td>
        ${vals.map(v=>`<td style="color:${row.bold?ravColor(v):row.c}">${fmt(v)}</td>`).join('')}
        <td style="color:${row.bold?ravColor(tot):row.c};font-weight:700">${fmt(tot)}</td></tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function bindInputs() {
  MONTHS.forEach(month => {
    const id=pid(month);
    const sel=document.getElementById(`sal-${id}`);
    const del=document.getElementById(`dec-${id}`);
    if(sel) sel.addEventListener('change',e=>{gs(month).salary=parseFloat(e.target.value)||0;save(month);refresh(month);});
    if(del) del.addEventListener('change',e=>{gs(month).decouvert=parseFloat(e.target.value)||0;save(month);refresh(month);});
    gs(month).abos.forEach((a,i)=>{
      const el=document.getElementById(`abo-${id}-${i}`);
      if(el) el.addEventListener('change',e=>{gs(month).abos[i].amt=parseFloat(e.target.value)||0;save(month);refresh(month);});
    });
  });
}

function refresh(month) {
  const el=document.getElementById(pid(month));
  if(!el) return;
  const sy=window.scrollY;
  el.innerHTML=monthHTML(month);
  window.scrollTo(0,sy);
  bindInputs();
  const se=document.getElementById('page-Synthese');
  if(se) se.innerHTML=syntheseHTML();
}

function delEntry(month,idx) { gs(month).entries.splice(idx,1); save(month); refresh(month); }

// Modal
function updateCatList() {
  const type=document.getElementById('inputType').value;
  document.getElementById('inputCat').innerHTML=(type==='remboursement'?['Remboursement']:BUDGET_CATS.map(c=>c.name)).map(n=>`<option>${n}</option>`).join('');
}
function openModal() { updateCatList();document.getElementById('inputAmount').value='';document.getElementById('inputNote').value='';document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function addEntry() {
  const type=document.getElementById('inputType').value;
  const cat=document.getElementById('inputCat').value;
  const amt=parseFloat(document.getElementById('inputAmount').value);
  const note=document.getElementById('inputNote').value.trim();
  if(!cat||isNaN(amt)||amt<=0) return;
  gs(currentMonth).entries.push({type,cat,amt,note,ts:Date.now()});
  save(currentMonth);closeModal();refresh(currentMonth);
  showToast(`${type==='remboursement'?'Remboursement':'Dépense'} ajouté${type==='remboursement'?'':'e'} · ${fmt(amt)}`);
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──
async function init() {
  const ls=document.getElementById('loadingScreen');
  const lm=document.getElementById('loadingMsg');
  setSyncStatus('saving','Connexion…');
  // Fallback localStorage d'abord
  try { const d=JSON.parse(localStorage.getItem('budget-2025')||'{}'); MONTHS.forEach(m=>{if(d[m])state[m]=d[m];}); } catch(e){}
  // Puis Supabase
  lm.textContent='Chargement depuis le cloud…';
  await dbLoad();
  ls.classList.add('hidden');
  render();
}
init();
</script>
</body>
</html>
